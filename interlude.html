<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Part complete</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',sans-serif;background:#ece9e3;min-height:100vh;color:#1c1c1a}
.app{max-width:580px;margin:0 auto;padding:24px 16px 60px}
.card{background:#fff;border-radius:14px;border:1px solid #e4e3dd;overflow:hidden;box-shadow:0 2px 24px rgba(0,0,0,0.09)}
.outcome{padding:52px 24px;display:flex;flex-direction:column;align-items:center;text-align:center}
.o-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:18px;background:#1c1c1a;color:#fff}
.o-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.o-text{font-size:13px;color:#58584f;line-height:1.65;max-width:340px;margin-bottom:24px}
.o-text strong{color:#1c1c1a;font-weight:600}
.btn{width:100%;max-width:300px;padding:13px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:#1c1c1a;color:#fff}
.btn:hover{opacity:.88}
</style>
</head>
<body>
<div class="app"><div class="card">
  <div class="outcome">
    <div class="o-icon">✓</div>
    <div class="o-title" id="title">Part 1 of 2 complete</div>
    <div class="o-text">Take a short break if you need one. The second walkthrough presents the <strong>same scenario</strong>: you are Alice, and you've just received an email about activity on your account. Please approach it fresh, as if seeing it for the first time.</div>
    <button class="btn" onclick="location.href=Study.nextFile()">Begin part <span id="next">2</span> →</button>
  </div>
</div></div>
<script src="study.js"></script>
<script>
Study.initPage("interlude");
var info = Study.partInfo();
if (!info) { location.href = "index.html"; }
else {
  document.getElementById("title").textContent = "Part " + info.part + " of " + info.total + " complete";
  document.getElementById("next").textContent = info.part + 1;
}
</script>
</body>
</html>
