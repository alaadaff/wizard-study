<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study complete</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',sans-serif;background:#ece9e3;min-height:100vh;color:#1c1c1a}
.app{max-width:580px;margin:0 auto;padding:24px 16px 60px}
.card{background:#fff;border-radius:14px;border:1px solid #e4e3dd;overflow:hidden;box-shadow:0 2px 24px rgba(0,0,0,0.09)}
.outcome{padding:52px 24px;display:flex;flex-direction:column;align-items:center;text-align:center}
.o-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:18px;background:#1c1c1a;color:#fff}
.o-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
.o-text{font-size:13px;color:#58584f;line-height:1.65;max-width:340px;margin-bottom:8px}
.pid{font-size:13px;font-weight:600;background:#f7f6f2;border:1px solid #e4e3dd;border-radius:20px;padding:6px 16px;margin:10px 0 18px}
.status{font-size:12px;color:#98978f;max-width:320px;line-height:1.6;margin-bottom:18px}
.btn{width:100%;max-width:300px;padding:13px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:#1c1c1a;color:#fff}
.btn:hover{opacity:.88}
.btn-secondary{background:#fff;color:#58584f;border:1px solid #d0cfc8;margin-top:8px}
</style>
</head>
<body>
<div class="app"><div class="card">
  <div class="outcome">
    <div class="o-icon">✓</div>
    <div class="o-title">All done — thank you!</div>
    <div class="o-text">You have completed both walkthroughs. Your participant ID is:</div>
    <div class="pid" id="pid">—</div>
    <div class="status" id="status"></div>
    <button class="btn" onclick="Study.download()">Download my responses (backup)</button>
  </div>
</div></div>
<script src="study.js"></script>
<script>
var res = Study.complete();
if (!res) { location.href = "index.html"; }
else {
  document.getElementById("pid").textContent = res.pid;
  document.getElementById("status").textContent = res.endpointConfigured
    ? "Your responses were recorded automatically. Please also download a backup copy below and keep it until the researcher confirms receipt."
    : "Please download your responses below and return the file to the researcher as instructed in your invitation email.";
}
</script>
</body>
</html>
